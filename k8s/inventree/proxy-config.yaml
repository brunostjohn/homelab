apiVersion: v1
kind: ConfigMap
metadata:
  name: inventree-proxy-config
  namespace: productivity
data:
  Caddyfile: |
    # Caddyfile for InvenTree, adapted for Kubernetes.
    #
    # This proxy runs behind a Kubernetes Ingress which terminates TLS and
    # forwards plain HTTP. Caddy therefore listens on :80 only, does no cert
    # management, and trusts the cluster network so the Ingress-supplied
    # X-Forwarded-* headers are preserved and passed to the InvenTree server
    # (InvenTree is configured with INVENTREE_USE_X_FORWARDED_* = True).
    #
    # No environment variables are consumed by this config; the upstream is
    # hardcoded to the in-cluster Service address.
    #
    # Ref to the Caddyfile documentation: https://caddyserver.com/docs/caddyfile

    # Global options: trust the private cluster network (Ingress / pod IPs) so
    # that incoming X-Forwarded-For / -Proto / -Host headers are honoured
    # instead of being overwritten with the local http connection values.
    {
      servers {
        trusted_proxies static private_ranges
      }
    }

    # Logging configuration for Caddy
    (log_common) {
      log {
        output file /var/log/caddy/{args[0]}.access.log
      }
    }

    # CORS headers control (used for static and media files)
    (cors-headers) {
      header Allow GET,HEAD,OPTIONS
      header Access-Control-Allow-Origin *
      header Access-Control-Allow-Methods GET,HEAD,OPTIONS
      header Access-Control-Allow-Headers Authorization,Content-Type,User-Agent,traceparent

      @cors_preflight{args[0]} method OPTIONS

      handle @cors_preflight{args[0]} {
        respond "" 204
      }
    }

    # Listen for plain HTTP on port 80. TLS is terminated at the Kubernetes
    # Ingress, so automatic HTTPS is intentionally not used here.
    :80 {
      import log_common inventree

      encode gzip

      request_body {
        max_size 100MB
      }

      # Handle static request files
      handle_path /static/* {
        import cors-headers static

        root * /var/www/static
        file_server
      }

      # Handle media request files
      handle_path /media/* {
        import cors-headers media

        root * /var/www/media
        file_server

        # Force download of media files (for security)
        # Comment out this line if you do not want to force download
        header Content-Disposition attachment

        # Authentication is handled by the forward_auth directive
        # This is required to ensure that media files are only accessible to authenticated users
        forward_auth http://inventree-server:8000 {
          uri /auth/
        }
      }

      # All other requests are proxied to the InvenTree server.
      # Trusted proxies are configured globally above, so the Ingress-provided
      # X-Forwarded-* headers are forwarded through to InvenTree unchanged.
      reverse_proxy http://inventree-server:8000
    }
