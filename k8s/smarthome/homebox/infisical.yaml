apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: homebox-secrets-infisical
  namespace: smarthome
spec:
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: cluster-secrets-rgq1
        envSlug: dev
        secretsPath: /homebox
        recursive: true
      credentialsRef:
        secretName: infisical-machine-id
        secretNamespace: infisical
  managedSecretReference:
    secretName: homebox-secrets
    secretNamespace: smarthome
    creationPolicy: Owner
